<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf9f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2c4b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#grad5)"/>

  <!-- Book/document -->
  <g opacity="0.8">
    <rect x="150" y="150" width="280" height="350" fill="none" stroke="#7b581b" stroke-width="3"/>
    <line x1="290" y1="150" x2="290" y2="500"/>

    <!-- Pages -->
    <line x1="180" y1="200" x2="420" y2="200"/>
    <line x1="180" y1="250" x2="420" y2="250"/>
    <line x1="180" y1="300" x2="420" y2="300"/>
    <line x1="180" y1="350" x2="420" y2="350"/>
    <line x1="180" y1="400" x2="420" y2="400"/>
  </g>

  <!-- Arrow showing portability -->
  <g stroke="#7b581b" stroke-width="4" fill="none" opacity="0.7">
    <line x1="500" y1="325" x2="650" y2="325"/>
    <polygon points="670,325 650,315 650,335" fill="#7b581b" opacity="0.7"/>
  </g>

  <!-- Open record symbol -->
  <g opacity="0.8">
    <rect x="750" y="200" width="250" height="250" fill="none" stroke="#7b581b" stroke-width="3"/>
    <circle cx="875" cy="325" r="60" fill="none" stroke="#7b581b" stroke-width="2"/>
    <text x="855" y="340" font-family="monospace" font-size="48" fill="#7b581b">◯</text>
  </g>

  <!-- Text -->
  <text x="800" y="520" font-family="serif" font-size="40" font-weight="bold" fill="#1b1c1a">
    Open Learner Record
  </text>
</svg>