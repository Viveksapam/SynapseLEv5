<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf9f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#grad4)"/>

  <!-- Network nodes -->
  <g fill="#7b581b" opacity="0.6">
    <circle cx="250" cy="200" r="25"/>
    <circle cx="400" cy="150" r="25"/>
    <circle cx="500" cy="280" r="25"/>
    <circle cx="300" cy="400" r="25"/>
    <circle cx="450" cy="450" r="25"/>
  </g>

  <!-- Connecting lines (algorithm pathways) -->
  <g stroke="#7b581b" stroke-width="2" opacity="0.4">
    <line x1="250" y1="200" x2="400" y2="150"/>
    <line x1="250" y1="200" x2="500" y2="280"/>
    <line x1="250" y1="200" x2="300" y2="400"/>
    <line x1="400" y1="150" x2="500" y2="280"/>
    <line x1="300" y1="400" x2="450" y2="450"/>
    <line x1="500" y1="280" x2="450" y2="450"/>
  </g>

  <!-- Central large node -->
  <circle cx="350" cy="320" r="40" fill="#7b581b" opacity="0.8"/>
  <text x="335" y="335" font-family="monospace" font-size="24" fill="#fbf9f6" font-weight="bold">A</text>

  <!-- Text -->
  <text x="800" y="280" font-family="serif" font-size="48" font-weight="bold" fill="#1b1c1a">
    ETHICS OF
  </text>
  <text x="800" y="360" font-family="serif" font-size="44" fill="#1b1c1a">
    Algorithms
  </text>
  <text x="800" y="420" font-family="monospace" font-size="14" fill="#4f4539">
    Who decides visibility?
  </text>
</svg>