<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf9f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2c4b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#grad1)"/>

  <!-- Architectural grid -->
  <g stroke="#7b581b" stroke-width="2" opacity="0.6">
    <line x1="150" y1="100" x2="150" y2="575"/>
    <line x1="300" y1="100" x2="300" y2="575"/>
    <line x1="450" y1="100" x2="450" y2="575"/>
    <line x1="600" y1="100" x2="600" y2="575"/>
    <line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="100" y1="500" x2="700" y2="500"/>
  </g>

  <!-- Central columns -->
  <rect x="200" y="150" width="40" height="400" fill="#7b581b" opacity="0.8"/>
  <rect x="350" y="120" width="40" height="430" fill="#7b581b" opacity="0.6"/>
  <rect x="500" y="180" width="40" height="370" fill="#7b581b" opacity="0.7"/>

  <!-- Text label -->
  <text x="900" y="350" font-family="serif" font-size="48" font-weight="bold" fill="#1b1c1a">
    TRUST
  </text>
  <text x="900" y="400" font-family="monospace" font-size="16" fill="#4f4539">
    Architecture of Discourse
  </text>
</svg>